<!doctype html>
<html class="dark" dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عرض القصيدة - ديوان الصوفية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@200..800&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Scheherazade+New:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0a5750",
              "primary-dark": "#052e2a",
              accent: "#d4b068",
              "background-dark": "#121616",
              paper: "#F2F0E6",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              poem: ["Scheherazade New", "Amiri", "serif"],
              "arabic-ui": ["Noto Sans Arabic", "Cairo", "sans-serif"],
            },
            backgroundImage: {
              vignette:
                "radial-gradient(circle, transparent 20%, #121616 120%)",
              "subtle-glow":
                "radial-gradient(circle at center, rgba(10,87,80,0.25) 0%, rgba(18,22,22,0) 60%)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../css/design.css" />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
    </style>
  </head>
  <body
    class="bg-[#121616] text-[#F2F0E6] font-display antialiased overflow-x-hidden selection:bg-primary selection:text-white min-h-screen relative"
  >
    <!-- Background ambience -->
    <div class="fixed inset-0 pointer-events-none z-0">
      <div class="absolute inset-0 bg-subtle-glow opacity-80"></div>
      <div
        class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-[0.03]"
      ></div>
      <div class="absolute inset-0 bg-vignette"></div>
    </div>

    <!-- Layout -->
    <div class="relative z-10 flex flex-col min-h-screen">
      <!-- Header (fixed) -->
      <header class="fixed top-0 w-full z-50 transition-all duration-300">
        <div
          class="absolute inset-0 bg-gradient-to-b from-[#121616] to-transparent h-32 pointer-events-none"
        ></div>
        <div
          class="relative flex justify-between items-center px-5 py-5 md:px-10 md:py-7"
        >
          <!-- Bookmark button -->
          <button
            id="bookmarkBtn"
            aria-label="إشارة مرجعية"
            class="group flex items-center justify-center w-10 h-10 rounded-full bg-white/5 hover:bg-primary/20 hover:scale-105 transition-all duration-300 border border-white/5 backdrop-blur-sm"
          >
            <span
              class="material-symbols-outlined text-white/70 group-hover:text-[#d4b068] transition-colors"
              style="font-size: 20px"
              >bookmark_border</span
            >
          </button>

          <!-- Right side: lead actions + close -->
          <div class="flex items-center gap-2">
            <div class="lead-only hidden flex items-center gap-2">
              <button
                id="sharePoemBtn"
                class="flex items-center gap-1.5 px-3 py-2 rounded-full bg-primary/20 border border-primary/30 text-primary-light hover:bg-primary/30 transition-all text-xs font-bold"
              >
                <span class="material-symbols-outlined text-base"
                  >podcasts</span
                >
                مشاركة
              </button>
              <button
                id="editPoemBtn"
                class="p-2 rounded-full bg-white/5 border border-white/10 text-white/60 hover:text-white hover:bg-white/10 transition-all"
              >
                <span class="material-symbols-outlined" style="font-size: 20px"
                  >edit</span
                >
              </button>
              <button
                id="deletePoemBtn"
                class="p-2 rounded-full bg-white/5 border border-white/10 text-white/60 hover:text-red-400 hover:bg-red-400/10 transition-all"
              >
                <span class="material-symbols-outlined" style="font-size: 20px"
                  >delete</span
                >
              </button>
            </div>
            <button
              id="backBtn"
              aria-label="رجوع"
              class="group flex items-center justify-center w-10 h-10 rounded-full bg-transparent hover:bg-white/5 hover:rotate-90 transition-all duration-300"
            >
              <span
                class="material-symbols-outlined text-white/60 group-hover:text-white"
                style="font-size: 26px; font-weight: 300"
                >close</span
              >
            </button>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main
        class="flex-grow flex flex-col items-center pt-28 pb-36 px-4 md:px-0"
      >
        <div
          class="w-full max-w-3xl mx-auto flex flex-col gap-10 text-center fade-in"
        >
          <!-- Poem header -->
          <div class="flex flex-col gap-3 items-center mb-4">
            <div
              class="w-16 h-[1px] bg-gradient-to-r from-transparent via-primary to-transparent mb-1"
            ></div>
            <h1
              id="poemTitle"
              class="text-3xl md:text-5xl font-black text-white leading-tight tracking-tight font-arabic-ui text-glow-gold"
            >
              <div class="skeleton h-10 w-48 mx-auto rounded"></div>
            </h1>
            <div class="flex items-center gap-2 mt-1">
              <span class="h-1 w-1 rounded-full bg-[#d4b068]"></span>
              <p
                id="poemPoet"
                class="text-base md:text-lg text-white/60 font-arabic-ui font-light"
              ></p>
              <span class="h-1 w-1 rounded-full bg-[#d4b068]"></span>
            </div>
            <div id="poemCategory" class="text-sm text-white/40 mt-1"></div>
          </div>

          <!-- Poem body -->
          <div
            id="poemBody"
            class="font-poem text-2xl md:text-3xl leading-[2.5] md:leading-[2.8] text-[#e8efe9] space-y-8 md:space-y-10 w-full"
          >
            <!-- Loaded dynamically -->
          </div>

          <!-- End ornament -->
          <div class="mt-6 flex justify-center opacity-30">
            <div class="text-[#d4b068] text-3xl select-none">✦ ✦ ✦</div>
          </div>
        </div>
      </main>

      <!-- Footer controls (fixed) -->
      <footer
        class="fixed bottom-0 w-full z-40 flex flex-col items-center pointer-events-none"
      >
        <div
          class="absolute inset-0 bg-gradient-to-t from-[#121616] via-[#121616]/90 to-transparent -z-10"
        ></div>

        <!-- Maqam pill -->
        <div
          id="maqamPill"
          class="mb-6 animate-bounce-slow pointer-events-auto"
        >
          <div
            class="glass-panel px-5 py-2 rounded-full flex items-center gap-3 shadow-2xl shadow-primary/20 hover:bg-primary/30 transition-colors cursor-pointer group maqam-pill"
          >
            <span
              class="material-symbols-outlined text-[#d4b068]/80 group-hover:text-[#d4b068] transition-colors"
              style="font-size: 18px"
              >graphic_eq</span
            >
            <div class="flex flex-col items-start leading-none">
              <span
                class="text-[10px] uppercase tracking-widest text-white/40 mb-1 font-display"
              >
                مقام موسيقي
              </span>
              <span
                id="poemMaqam"
                class="text-sm font-bold text-white font-arabic-ui"
                >—</span
              >
            </div>
            <span class="material-symbols-outlined text-white/30 text-xs mr-1"
              >chevron_left</span
            >
          </div>
        </div>

        <!-- Progress bar -->
        <div class="w-full h-1 bg-[#293837] pointer-events-none">
          <div
            id="progressBar"
            class="h-full bg-gradient-to-l from-primary to-emerald-400 rounded-r-full shadow-[0_0_10px_rgba(16,185,129,0.5)] progress-bar-inner"
            style="width: 0%"
          ></div>
        </div>
      </footer>
    </div>

    <script>
      // Show lead-only elements
      try {
        const user = JSON.parse(localStorage.getItem("divan_user"));
        if (user?.role === "LeadMunshid") {
          document
            .querySelectorAll(".lead-only")
            .forEach((el) => el.classList.remove("hidden"));
        }
      } catch {}
    </script>
    <script type="module" src="../js/pages/view-poem.js"></script>
  </body>
</html>
