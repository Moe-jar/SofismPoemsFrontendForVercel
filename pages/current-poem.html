<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القصيدة الحالية - ديوان الصوفية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0a5750",
            "primary-light": "#158c82",
            "accent": "#d4b068",
            "background-dark": "#121616",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"],
            "poem": ["Amiri", "serif"],
            "arabic-ui": ["Noto Naskh Arabic", "sans-serif"],
          },
          backgroundImage: {
            "subtle-glow": "radial-gradient(circle at center, rgba(10,87,80,0.25) 0%, rgba(18,22,22,0) 60%)",
            "vignette": "radial-gradient(circle, transparent 20%, #121616 120%)",
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/design.css">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .live-pulse::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(16,185,129,0.5);
      animation: pulse-ring 1.5s ease-out infinite;
    }
  </style>
</head>
<body class="bg-[#121616] text-[#F2F0E6] font-display antialiased overflow-x-hidden
  selection:bg-primary selection:text-white min-h-screen relative">

  <!-- Background -->
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute inset-0 bg-subtle-glow opacity-80"></div>
    <div class="absolute inset-0 bg-vignette"></div>
  </div>

  <div class="relative z-10 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50">
      <div class="absolute inset-0 bg-gradient-to-b from-[#121616] to-transparent h-28
        pointer-events-none"></div>
      <div class="relative flex justify-between items-center px-5 py-5 md:px-10">
        <!-- Live indicator -->
        <div class="flex items-center gap-3">
          <div class="relative">
            <div class="w-3 h-3 rounded-full bg-emerald-400 live-pulse"></div>
          </div>
          <span class="text-sm font-bold text-emerald-400 uppercase tracking-wider">مباشر</span>
        </div>

        <div class="flex items-center gap-2">
          <a href="../index.html" class="p-2 rounded-full bg-white/5 hover:bg-white/10
            transition-all text-white/60 hover:text-white border border-white/5">
            <span class="material-symbols-outlined" style="font-size:20px;">home</span>
          </a>
          <button id="backBtn" class="p-2 rounded-full hover:bg-white/10 transition-all
            text-white/60 hover:text-white">
            <span class="material-symbols-outlined" style="font-size:24px;">close</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="flex-grow flex flex-col items-center pt-28 pb-24 px-4 md:px-0">

      <!-- No poem message -->
      <div id="noPoemMessage" class="hidden flex flex-col items-center justify-center
        flex-1 gap-6 text-center py-20">
        <div class="w-20 h-20 rounded-full bg-primary/10 border border-primary/20
          flex items-center justify-center">
          <span class="material-symbols-outlined text-[#9db8b6] text-4xl">menu_book</span>
        </div>
        <div>
          <h2 class="text-white text-xl font-bold mb-2">لا توجد قصيدة حالية</h2>
          <p class="text-[#9db8b6] text-sm max-w-xs mx-auto">
            ينتظر المنشد الرئيسي مشاركة قصيدة ليراها الجميع في الوقت الفعلي.
          </p>
        </div>
        <a href="poems.html" class="px-6 py-3 rounded-xl bg-primary/20 border border-primary/30
          text-primary-light hover:bg-primary/30 transition-all font-bold text-sm">
          تصفح الديوان
        </a>
      </div>

      <!-- Poem container -->
      <div id="poemContainer" class="hidden w-full max-w-3xl mx-auto flex flex-col gap-10
        text-center fade-in">

        <!-- Poem title & meta -->
        <div class="flex flex-col gap-3 items-center">
          <div class="flex items-center gap-2 text-xs text-[#9db8b6] mb-2">
            <span class="material-symbols-outlined text-sm">person</span>
            شارك بواسطة: <span id="sharedBy" class="text-primary-light font-bold"></span>
            <span class="opacity-50">•</span>
            <span id="sharedAt"></span>
          </div>
          <div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-primary to-transparent mb-1"></div>
          <h1 id="poemTitle" class="text-3xl md:text-5xl font-black text-white leading-tight
            tracking-tight font-arabic-ui text-glow-gold"></h1>
          <div class="flex items-center gap-2 mt-1">
            <span class="h-1 w-1 rounded-full bg-[#d4b068]"></span>
            <p id="poemPoet" class="text-base text-white/60 font-arabic-ui font-light"></p>
            <span class="h-1 w-1 rounded-full bg-[#d4b068]"></span>
          </div>
        </div>

        <!-- Poem body -->
        <div id="poemBody"
          class="font-poem text-2xl md:text-3xl leading-[2.5] md:leading-[2.8]
            text-[#e8efe9] space-y-8 w-full"></div>

        <!-- Read full poem link -->
        <div class="mt-4">
          <a id="readPoemLink" href="poems.html"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl glass-panel
              text-[#9db8b6] hover:text-white hover:bg-white/10 transition-all text-sm font-bold">
            <span class="material-symbols-outlined text-lg">open_in_new</span>
            قراءة القصيدة كاملة
          </a>
        </div>
      </div>

    </main>

    <!-- Maqam floating pill (fixed bottom) -->
    <div id="maqamPill" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40 animate-bounce-slow">
      <div class="glass-panel px-5 py-2.5 rounded-full flex items-center gap-3
        shadow-2xl shadow-primary/20 maqam-pill">
        <span class="material-symbols-outlined text-[#d4b068]/80 text-lg">graphic_eq</span>
        <div class="flex flex-col items-start leading-none">
          <span class="text-[10px] uppercase tracking-widest text-white/40 mb-1">مقام</span>
          <span id="poemMaqam" class="text-sm font-bold text-white font-arabic-ui">—</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    try {
      const user = JSON.parse(localStorage.getItem('divan_user'));
      if (user?.role === 'LeadMunshid') {
        document.querySelectorAll('.lead-only').forEach(el => el.classList.remove('hidden'));
      }
    } catch {}
  </script>
  <script type="module" src="../js/pages/current-poem.js"></script>
</body>
</html>
